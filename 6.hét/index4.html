<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teendő lista</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .vezerlo-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #218838;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            background-color: white;
            padding: 12px;
            border: 1px solid #ddd;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        li:hover {
            background-color: #f9f9f9;
        }

        .athuzott {
            text-decoration: line-through;
            color: #888;
            background-color: #e9ecef;
        }
    </style>
</head>
<body>

    <h1>Teendők</h1>
    
    <div class="vezerlo-panel">
        <input type="text" id="teendoBemenet" placeholder="Új teendő megadása...">
        <button id="hozzaadasGomb">Hozzáadás</button>
    </div>

    <ul id="teendoLista"></ul>

    <script>
        const bemenet = document.getElementById('teendoBemenet');
        const gomb = document.getElementById('hozzaadasGomb');
        const lista = document.getElementById('teendoLista');

        gomb.addEventListener('click', function() {
            const szoveg = bemenet.value.trim();
            
            if (szoveg !== "") {
                const ujElem = document.createElement('li');
                ujElem.textContent = szoveg;
                
                ujElem.addEventListener('click', function() {
                    ujElem.classList.toggle('athuzott');
                });
                
                lista.appendChild(ujElem);
                bemenet.value = "";
            }
        });
    </script>

</body>
</html>
